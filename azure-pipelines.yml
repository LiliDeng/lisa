trigger: none

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  - group: lisa_log_agent

  - name: pythonVersion
    value: '3.12'

  # Replace with your Azure DevOps Service Connection name
  - name: azureServiceConnection
    value: 'lisa_connection'

  # Replace with your LISA runbook
  - name: runbook
    value: 'lisa/microsoft/runbook/ai_selected.yml'

  # Azure region
  - name: location
    value: 'westus3'

steps:

- checkout: self
  fetchDepth: 0

- task: UsePythonVersion@0
  displayName: Use Python $(pythonVersion)
  inputs:
    versionSpec: $(pythonVersion)

- script: |
    sudo apt-get update -qq
    sudo apt-get install -y git gcc libgirepository1.0-dev libcairo2-dev pkg-config python3-dev
  displayName: Install system dependencies

- script: |
    python -m pip install --upgrade pip
    pip install -e ".[azure]"
  displayName: Install LISA

- script: |

    set -euo pipefail

    TARGET="$(System.PullRequest.TargetBranch)"
    TARGET="${TARGET#refs/heads/}"

    echo "Target branch: $TARGET"

    git fetch origin "$TARGET"

    BASE=$(git merge-base HEAD origin/$TARGET)

    echo "Merge base: $BASE"

    git diff --name-only "$BASE"...HEAD \
      | tee /tmp/changed_files.txt

    git diff "$BASE"...HEAD \
      > /tmp/pr_diff.txt

    echo ""
    echo "Changed files:"
    cat /tmp/changed_files.txt

    echo ""

    echo "Changed file count:"
    wc -l /tmp/changed_files.txt

    echo ""

    echo "Diff size:"
    wc -c /tmp/pr_diff.txt

  displayName: Generate PR Diff

- script: |

    export PR_CHANGED_FILES="$(cat /tmp/changed_files.txt)"

    export PR_DIFF="$(head -c 30000 /tmp/pr_diff.txt)"

    export RUNBOOK_OUTPUT="ai_selected_cases.yml"

    python .github/scripts/ai_select_cases.py

  displayName: AI Select Test Cases
  env:
    AZURE_OPENAI_API_KEY: $(azure_openai_api_key)
    AZURE_OPENAI_ENDPOINT: $(azure_openai_endpoint)
    AZURE_OPENAI_DEPLOYMENT: gpt-4o
    AZURE_OPENAI_API_VERSION: '2024-02-15-preview'

- script: |

    python <<'PY'

    import yaml

    with open("ai_selected_cases.yml") as f:
        rb = yaml.safe_load(f)

    cases = []

    image = ""

    variables = rb.get("variable", [])

    for v in variables:
        if v.get("name") == "marketplace_image":
            image = v.get("value", "")

    for t in rb.get("testcase", []):
        c = t.get("criteria", {}).get("name")
        if c:
            cases.append(c)

    print("Selected:", cases)

    print(f"##vso[task.setvariable variable=CASE_NAMES]{','.join(cases)}")
    print(f"##vso[task.setvariable variable=CASE_COUNT]{len(cases)}")
    print(f"##vso[task.setvariable variable=MARKETPLACE_IMAGE]{image}")

    PY

  displayName: Read AI Selection

- task: AzureCLI@2
  displayName: Login to Azure using OIDC
  inputs:
    azureSubscription: $(azureServiceConnection)
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      set -e

      echo "Current Azure Account:"
      az account show

      SUBSCRIPTION_ID=$(az account show --query id -o tsv)

      ARM_TOKEN=$(az account get-access-token \
        --resource https://management.azure.com/ \
        --query accessToken \
        -o tsv)

      echo "##vso[task.setvariable variable=SUBSCRIPTION_ID]$SUBSCRIPTION_ID"
      echo "##vso[task.setvariable variable=ARM_TOKEN;issecret=true]$ARM_TOKEN"

- script: |
    echo "Selected $(CASE_COUNT) test cases."
  displayName: Summary

- script: |
    echo "No test case selected."
    exit 0
  displayName: Skip
  condition: eq(variables['CASE_COUNT'], '0')

- script: |

    CASE_PATTERN=$(echo "$(CASE_NAMES)" | tr ',' '|')

    echo "Running:"
    echo "$CASE_PATTERN"

    lisa \
      -r $(runbook) \
      -v "subscription_id:$(SUBSCRIPTION_ID)" \
      -v "location:$(location)" \
      -v "marketplace_image:$(MARKETPLACE_IMAGE)" \
      -v "test_case_name:$CASE_PATTERN" \
      -v "enable_tests:False" \
      -v "auth_type:token" \
      -v "s:azure_arm_access_token:$(ARM_TOKEN)"

  displayName: Run Selected LISA Tests
  condition: ne(variables['CASE_COUNT'], '0')

- task: PublishTestResults@2
  displayName: Publish JUnit Results
  condition: always()
  inputs:
    testResultsFormat: JUnit
    testResultsFiles: '**/lisa.junit.xml'
    failTaskOnFailedTests: false
    testRunTitle: 'LISA Test Results'

- task: PublishBuildArtifacts@1
  displayName: Publish Runtime Artifacts
  condition: always()
  inputs:
    PathtoPublish: runtime
    ArtifactName: lisa-runtime

- task: PublishBuildArtifacts@1
  displayName: Publish AI Selection
  condition: always()
  inputs:
    PathtoPublish: ai_selected_cases.yml
    ArtifactName: ai-selected-runbook